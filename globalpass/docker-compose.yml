services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: globalpassdb
      POSTGRES_USER: globalpass
      POSTGRES_PASSWORD: globalpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U globalpass"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./back-end
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/globalpassdb
      SPRING_DATASOURCE_USERNAME: globalpass
      SPRING_DATASOURCE_PASSWORD: globalpass
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./front-end
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8080
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    depends_on:
      - backend

volumes:
  pgdata:
