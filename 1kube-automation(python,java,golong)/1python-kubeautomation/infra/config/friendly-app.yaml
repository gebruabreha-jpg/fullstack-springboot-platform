apiVersion: v1
kind: Pod
metadata:
  name: friendly-app-pod
  namespace: kwok-test
spec:
  containers:
    - name: friendly-app
      image: python:3.11-slim
      command: ["python", "-c", "print('Hello from friendly app!')"]
  restartPolicy: Never
status:
  phase: Running
  conditions:
    - type: Ready
      status: "True"
      reason: PodReady
  hostIP: "10.0.0.1"
  podIP:   "172.17.0.3"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: friendly-app-deployment
  namespace: kwok-test
spec:
  replicas: 10
  selector:
    matchLabels:
      app: friendly-app
  template:
    metadata:
      labels:
        app: friendly-app
    spec:
      containers:
        - name: friendly-app
          image: python:3.11-slim
          command:
            - python
            - "-c"
            - |
              import time
              while True:
                  time.sleep(10)
