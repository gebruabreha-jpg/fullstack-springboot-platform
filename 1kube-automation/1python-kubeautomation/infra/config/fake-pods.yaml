apiVersion: v1
kind: Pod
metadata:
  name: fake-pod-1
  namespace: kwok-test
  labels:
    app: fake-worker
    tier: backend
spec:
  containers:
    - name: app
      image: python:3.11-slim
      command:
        - python
        - "-c"
        - |
          import time
          print("Fake pod is running indefinitely...")
          while True:
              time.sleep(10)
  restartPolicy: Never
status:
  phase: Running
  conditions:
    - type: Ready
      status: "True"
      reason: PodReady
  ## hostIP / podIP are fake; KWOK exposes them without an actual pod:   │
  hostIP: "10.0.0.1"
  podIP:   "172.17.0.2"
